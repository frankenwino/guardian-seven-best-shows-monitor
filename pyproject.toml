[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: tests that require network access or external services",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "discord_webhook.*",
    "bs4.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scraper"
disable_error_code = ["call-overload", "arg-type", "dict-item", "return-value", "var-annotated"]
